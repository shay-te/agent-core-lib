variables:
  MYSQL_USER: xyz
  MYSQL_PASSWORD: xx
  MYSQL_DB: db
  postgres_user: x
  postgres_password: x
  postgres_db: s
  sqlite_db: db
  solr_core_name: objective_love

core_lib:
  data:
    db:
      - protocol: mysql
        username: ${oc.env:MYSQL_USER}
        password: ${oc.env:MYSQL_PASSWORD}
        address: localhost
        port: 3306
        file: ${oc.env:MYSQL_DB}
      - protocol: sqlite
        file: ${oc.env:sqlite_db}
      - protocol: postgresql
        username: ${oc.env:postgres_user}
        password: ${oc.env:postgres_password}
        address: localhost
        port: 5432
        file: ${oc.env:postgres_db}
    memcached:
      url:
        host: localhost
        port: 11211
    solr:
      always_commit: true
      url:
        protocol: http
        host: localhost
        port: 8983
        path: solr
        file: ${oc.env:solr_core_name}

docker-compose:
version: '2'

services:

  core_lib_name:
    build:
      context: ""
      dockerfile: ./Dockerfile
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy
      solr:
        condition: service_healthy
      memcached:
        condition: service_healthy
    restart: always

  db:
    image: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${postgres_user}
      POSTGRES_PASSWORD: ${postgres_password}
      POSTGRES_DB: ${postgres_db}
